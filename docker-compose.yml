services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: inboxzero-backend
    container_name: inboxzero-backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      # OAuth needs absolute URLs.
      BACKEND_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
    restart: unless-stopped

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars are baked into the bundle at build time,
        # so they must be passed as build args, not runtime environment.
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    image: inboxzero-frontend
    container_name: inboxzero-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
