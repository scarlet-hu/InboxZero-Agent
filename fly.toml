# fly.toml app configuration file generated for inboxzero-backend on 2026-04-26T19:44:45+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'inboxzero-backend'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile.backend'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
